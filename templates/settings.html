<!DOCTYPE html>
<html>
<head>
    <title>Cam & OSD Settings</title>
</head>
<body>
    <h2>Parameters</h2>
    <form method="POST">
        <label>Resolution:</label><br>
        <select name="resolution">
            <option value="1280x720" {% if config.resolution[0] == 1280 and config.resolution[1] == 720 %}selected{% endif %}>1280x720</option>
            <option value="640x480" {% if config.resolution[0] == 640 and config.resolution[1] == 480 %}selected{% endif %}>640x480</option>
            <option value="640x360" {% if config.resolution[0] == 640 and config.resolution[1] == 360 %}selected{% endif %}>640x360</option>
        </select>
        <br><br>

        <label>OSD text:</label><br>
        <input type="text" name="osd_text" value="{{ config.osd_text }}"><br>
        <br>

        <label>Color:</label><br>
        <input type="color" name="color_hex" value="#{{ '%02x%02x%02x' % (config.color[2], config.color[1], config.color[0]) }}"><br>
        <br>

        <label>Compass speed(degree per second):</label><br>
        <input 
            type="number"
            step="0.1" 
            min="0"
            max="720"
            name="speed" 
            value="{{ config.compass_speed }}"><br>
        <br>

        <button type="submit">Apply Changes</button>
    </form>
</body>
</html>
